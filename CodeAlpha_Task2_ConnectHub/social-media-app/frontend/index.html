<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConnectHub - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loader" class="loader-overlay hidden">
    <div class="spinner"></div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Connect<span>Hub</span></a>

      <div class="nav-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search by name, username or user ID..." autocomplete="off">
        <div id="searchResults" class="search-results hidden"></div>
      </div>

      <div class="nav-actions">
        <button class="nav-icon-btn" id="darkModeToggle" title="Toggle dark mode">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>

        <div class="notification-wrapper">
          <button class="nav-icon-btn" id="notificationBtn" title="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notificationBadge" class="notification-badge hidden">0</span>
          </button>
          <div id="notificationDropdown" class="notification-dropdown hidden">
            <div class="notification-header">
              <h3>Notifications</h3>
              <button id="markAllRead" class="text-btn">Mark all read</button>
            </div>
            <div id="notificationList" class="notification-list"></div>
          </div>
        </div>

        <a href="profile.html" class="nav-user">
          <img id="navAvatar" src="images/default-avatar.svg" alt="Profile" class="nav-avatar">
          <span id="navUsername">User</span>
        </a>

        <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="feed-container">
      <!-- Stories Section -->
      <section class="stories-section card">
        <div id="storiesContainer" class="stories-scroll"></div>
      </section>

      <!-- Create Post -->
      <section class="create-post card">
        <div class="create-post-header">
          <img id="createPostAvatar" src="images/default-avatar.svg" alt="You" class="avatar-sm">
          <h3>Create a Post</h3>
        </div>
        <form id="createPostForm">
          <div class="image-upload-area" id="imageUploadArea">
            <input type="file" id="postImage" accept="image/*" hidden>
            <div id="uploadPlaceholder" class="upload-placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
              <p>Click to upload an image</p>
              <span>JPEG, PNG, GIF up to 5MB</span>
            </div>
            <div id="imagePreview" class="image-preview hidden">
              <img id="previewImg" src="" alt="Preview">
              <button type="button" id="removeImage" class="remove-image-btn">&times;</button>
            </div>
          </div>
          <textarea id="postCaption" placeholder="Write a caption..." rows="3" maxlength="2200"></textarea>
          <button type="submit" class="btn btn-primary" id="postSubmitBtn">Post</button>
        </form>
      </section>

      <!-- Feed -->
      <section id="feedSection">
        <div id="feedContainer" class="feed-list"></div>
        <div id="feedLoader" class="feed-loader hidden">
          <div class="spinner spinner-sm"></div>
        </div>
        <div id="emptyFeed" class="empty-state hidden">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <h3>No posts yet</h3>
          <p>Be the first to share something!</p>
        </div>
      </section>
    </div>
  </main>

  <!-- Image Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img id="lightboxImg" src="" alt="Full size">
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
