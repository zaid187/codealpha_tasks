<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConnectHub - Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loader" class="loader-overlay hidden">
    <div class="spinner"></div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Connect<span>Hub</span></a>

      <div class="nav-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search by name, username or user ID..." autocomplete="off">
        <div id="searchResults" class="search-results hidden"></div>
      </div>

      <div class="nav-actions">
        <button class="nav-icon-btn" id="darkModeToggle" title="Toggle dark mode">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>

        <a href="index.html" class="nav-icon-btn" title="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>

        <a href="profile.html" class="nav-user">
          <img id="navAvatar" src="images/default-avatar.svg" alt="Profile" class="nav-avatar">
          <span id="navUsername">User</span>
        </a>

        <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="profile-container">
      <!-- Profile Header -->
      <section class="profile-header card" id="profileHeader">
        <div class="profile-avatar-section">
          <img id="profileAvatar" src="images/default-avatar.svg" alt="Profile" class="profile-avatar">
        </div>
        <div class="profile-info">
          <div class="profile-top">
            <h2 id="profileUsername">username</h2>
            <div class="profile-actions" id="profileActions">
              <button class="btn btn-primary btn-sm" id="editProfileBtn">Edit Profile</button>
              <button class="btn btn-outline btn-sm" id="copyLinkBtn">Copy Profile Link</button>
            </div>
          </div>
          <div class="profile-stats">
            <div class="stat"><strong id="postsCount">0</strong> posts</div>
            <div class="stat"><strong id="followersCount">0</strong> followers</div>
            <div class="stat"><strong id="followingCount">0</strong> following</div>
          </div>
          <div class="profile-bio">
            <h3 id="profileName">Name</h3>
            <p id="profileBio">Bio goes here</p>
          </div>
        </div>
      </section>

      <!-- Edit Profile Modal -->
      <div id="editModal" class="modal hidden">
        <div class="modal-overlay" id="editModalOverlay"></div>
        <div class="modal-content card">
          <div class="modal-header">
            <h3>Edit Profile</h3>
            <button class="modal-close" id="closeEditModal">&times;</button>
          </div>
          <form id="editProfileForm">
            <div class="edit-avatar-section">
              <img id="editAvatarPreview" src="images/default-avatar.svg" alt="Preview" class="profile-avatar-sm">
              <label for="editProfileImage" class="btn btn-outline btn-sm">Change Photo</label>
              <input type="file" id="editProfileImage" accept="image/*" hidden>
            </div>
            <div class="form-group">
              <label for="editName">Name</label>
              <input type="text" id="editName" required>
            </div>
            <div class="form-group">
              <label for="editUsername">Username</label>
              <input type="text" id="editUsername" required>
            </div>
            <div class="form-group">
              <label for="editBio">Bio</label>
              <textarea id="editBio" rows="3" maxlength="300"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
          </form>
        </div>
      </div>

      <!-- User Posts Grid -->
      <section class="profile-posts">
        <h3 class="section-title">Posts</h3>
        <div id="profilePostsGrid" class="posts-grid"></div>
        <div id="emptyPosts" class="empty-state hidden">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <h3>No posts yet</h3>
          <p>This user hasn't shared anything.</p>
        </div>
      </section>
    </div>
  </main>

  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img id="lightboxImg" src="" alt="Full size">
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
