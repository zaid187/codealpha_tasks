<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login - ShopSphere</title>

    <link rel="stylesheet" href="./css/style.css">

</head>

<body class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">

            🛍️ ShopSphere

        </div>

        <h2>Welcome Back</h2>

        <p class="auth-subtitle">

            Login to continue shopping

        </p>

        <form id="loginForm">

            <div class="input-group">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required
                >

            </div>

            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

            </div>

            <button
                type="submit"
                class="auth-btn">

                Login

            </button>

        </form>

        <p class="auth-footer">

            Don't have an account?

            <a href="register.html">

                Register

            </a>

        </p>

    </div>

    <script src="./js/login.js"></script>

</body>

</html>
